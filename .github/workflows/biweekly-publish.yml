name: Bi-Weekly Content Publisher

on:
  schedule:
    - cron: '0 9 * * 4/14'
  workflow_dispatch:

jobs:
  publish-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and publish draft
        run: |
          if ! ls _drafts/*.html > /dev/null 2>&1; then
            echo "::warning::No drafts found in _drafts/ - add next article before scheduled run"
            exit 0
          fi

          DRAFT=$(ls _drafts/*.html | sort | head -1)
          DRAFT_NAME=$(basename "$DRAFT")
          echo "DRAFT_NAME=$DRAFT_NAME" >> $GITHUB_ENV

          # Move to root
          cp "$DRAFT" "$DRAFT_NAME"
          rm "$DRAFT"

          # Extract title
          TITLE=$(grep -oP '(?<=<title>)[^<]+' "$DRAFT_NAME" | sed 's/ — Broke.*//' | sed "s/'/\'/g")
          TODAY=$(date +"%B %-d, %Y")
          TODAY_ISO=$(date +"%Y-%m-%d")

          echo "Publishing: $DRAFT_NAME"
          echo "Title: $TITLE"
          echo "Date: $TODAY"

          # Build archive entry (single-line sed insert)
          ENTRY="              <a href=\"$DRAFT_NAME\" class=\"archive-item\"><time datetime=\"$TODAY_ISO\">$TODAY<\/time><span class=\"archive-title\">$TITLE<\/span><span class=\"archive-arrow\">&rarr;<\/span><\/a>"

          # Insert into archive.html after archive-list opening
          if [ -f archive.html ]; then
            sed -i "s|class=\"archive-list\"|class=\"archive-list\">\n$ENTRY\n<!--ARCHIVELIST|" archive.html
          fi

          # Update blog.html - inject new card at top of bml-originals-section
          NEW_CARD="        <a href=\"$DRAFT_NAME\" class=\"bml-card\"><div class=\"bml-card__body\"><p class=\"bml-card__meta\">$TODAY<\/p><h3 class=\"bml-card__title\">$TITLE<\/h3><span class=\"bml-card__cta\">Read &rarr;<\/span><\/div><\/a>"
          if [ -f blog.html ]; then
            sed -i "s|class=\"bml-card-grid\"|class=\"bml-card-grid\">\n$NEW_CARD\n<!--CARDGRID|" blog.html
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bi-weekly publish: $DRAFT_NAME [$TODAY_ISO]"
          git push
