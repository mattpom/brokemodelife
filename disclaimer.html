  <!-- Enhanced GA4 Event Tracking | BrokeModeLife -->
  <script>
  (function() {
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (!link || !link.href) return;
      var href = link.href;
      var text = (link.innerText || link.textContent || '').trim().substring(0, 100);
      var page = window.location.pathname;
      if (href.indexOf('amazon.com') !== -1) {
        gtag('event', 'affiliate_click', {'affiliate_network': 'Amazon Associates', 'affiliate_tag': 'brokemodelife-20', 'link_url': href, 'link_text': text, 'page_location': page});
        return;
      }
      if (href.indexOf('etsy.com') !== -1) {
        gtag('event', 'etsy_click', {'link_url': href, 'link_text': text, 'page_location': page});
        return;
      }
      if (href.indexOf(window.location.hostname) === -1 && href.indexOf('http') === 0) {
        gtag('event', 'outbound_click', {'link_url': href, 'link_text': text, 'page_location': page});
      }
    });
    document.addEventListener('submit', function(e) {
      var form = e.target;
      if (form.querySelector('input[type="email"]')) {
        gtag('event', 'email_signup', {'form_id': form.id || form.action || 'unknown', 'page_location': window.location.pathname});
      }
    });
    var scrollDepths = [25, 50, 75, 100], fired = {};
    window.addEventListener('scroll', function() {
      var scrolled = Math.round((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100);
      scrollDepths.forEach(function(d) {
        if (scrolled >= d && !fired[d]) { fired[d] = true; gtag('event', 'scroll_depth', {'depth_percent': d, 'page_location': window.location.pathname}); }
      });
    }, {passive: true});
  })();
  </script>
  <!-- End Enhanced GA4 Event Tracking -->
</body>
