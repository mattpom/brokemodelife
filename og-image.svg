<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Lime accent bar top -->
  <rect width="1200" height="6" fill="#c8f135"/>
  <!-- Left accent line -->
  <rect x="80" y="60" width="4" height="510" fill="#c8f135" opacity="0.3"/>
  <!-- Main title -->
  <text x="120" y="220" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#c8f135" letter-spacing="-2">BROKE</text>
  <text x="120" y="340" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#f5f5f0" letter-spacing="-2">MODE</text>
  <text x="120" y="460" font-family="Arial Black, sans-serif" font-size="110" font-weight="900" fill="#f5f5f0" letter-spacing="-2">LIFE.</text>
  <!-- Tagline -->
  <text x="120" y="530" font-family="Arial, sans-serif" font-size="28" fill="#888888" letter-spacing="4">LIVE LARGE ON A LEAN BUDGET</text>
  <!-- Dollar icon area -->
  <text x="900" y="400" font-family="Arial, sans-serif" font-size="240" fill="#c8f135" opacity="0.15">$</text>
  <!-- URL -->
  <text x="120" y="590" font-family="Arial, sans-serif" font-size="22" fill="#c8f135" opacity="0.7" letter-spacing="2">brokemodelife.com</text>
</svg>
